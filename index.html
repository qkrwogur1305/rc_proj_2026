<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나의 첫 페이지</title>
    <style>
        /* 1. 전체 배경과 글꼴 꾸미기 */
        body {
            background-color: #f4f7f6; /* 부드러운 연회색 배경 */
            font-family: 'Malgun Gothic', sans-serif; /* 깔끔한 글꼴 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* 2. 박스 스타일 만들기 */
        .card {
            background-color: white;
            padding: 40px;
            border-radius: 12px; /* 모서리 둥글게 */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); /* 은은한 그림자 */
            text-align: center;
        }

        /* 3. 제목(h1) 꾸미기 */
        h1 {
            color: #333333;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        /* 4. 본문(p) 꾸미기 */
        p {
            color: #666666;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>박재혁입니다. 테스트2</h1>
        <p>반갑습니다! CSS를 활용해 웹 페이지를 꾸미는 중입니다. 🚀</p>
    </div>

</body>
</html>
